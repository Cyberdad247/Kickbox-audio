name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Placeholder URL so Prisma can load config and generate the client.
      # No real database is contacted by lint / typecheck / unit tests / build.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Lint (Biome)
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (Vitest)
        run: npm run test
      - name: Build
        run: npm run build
