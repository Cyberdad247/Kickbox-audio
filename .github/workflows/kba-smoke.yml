name: KBA Smoke

# Per AGENTS.md governance rules, this workflow exercises the
# /api/bifrost/hitl handshake end-to-end on every push to a feat branch
# and on every PR targeting a feat branch. The workflow mints a real
# HMAC-signed KBA bundle (canonical actionId:timestamp) and asserts that
# the gated acknowledgement comes back. It also gates the read-only
# HELIO_PATCH.json dry-run to prove the regen script stays hygienic.

on:
  push:
    branches: ['feat/**']
  pull_request:
    branches: ['feat/**']
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  hitl-handshake:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      WEBHOOK_SECRET: kba-smoke-secret
      ACTION_SECRET: kba-smoke-secret
      HOST: http://localhost
      PORT: '3017'
      ACTION_ID: KBA_SYNC_001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        # 2026-06-27 promotion: bump to Node 22 LTS — current LTS since
        # 2024-10-29. Resolves the EBADENGINE warnings on @prisma/client
        # 5.22.0 + transitive deps that demand >=22.22.0. node-version is
        # a plain YAML scalar (not quoted) so it parses cleanly.
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install monorepo deps
        # Prisma postinstall must run so @prisma/client + @sovereign/db
        # workspace links generate their client outputs.
        run: npm ci --no-audit --no-fund

      - name: Build @sovereign/db workspace
        # 2026-06-27 fix: switched from `npm --prefix packages/db run
        # build` to `npm run build --workspace=@sovereign/db`. In npm
        # 10.x/11.x, `--prefix` is unreliable for `npm run` (it does
        # NOT change the script's CWD), so the inner `tsc` invocation
        # walked up from the monorepo root looking for a tsconfig.json,
        # found none, and fell back to TS defaults (declaration=false)
        # → no .d.ts emitted → bifrost typecheck identifies the same
        # TS2307 error against @sovereign/db downstream.
        # The --workspace flag uses the workspaces field in the root
        # package.json to correctly set CWD=packages/db, where its
        # tsconfig.json emits dist/index.{js,d.ts} deterministically.
        run: npm run build --workspace=@sovereign/db

      - name: Boot Bifrost dev server
        run: bash scripts/ci/start-bifrost.sh

      - name: Verify security.ts / state.ts typecheck
        run: npm --prefix apps/bifrost run typecheck && npm --prefix apps/pwa run typecheck

      - name: Vitest — security/issuance/nlp/state
        run: npx vitest run apps/bifrost/src/security.test.ts apps/bifrost/src/issuance.test.ts apps/bifrost/src/nlp.test.ts apps/bifrost/src/state.test.ts

      - name: Issue signed KBA action via fixture
        run: node scripts/ci/fixture-hitl.mjs

      - name: Dry-run HELIO_PATCH regen gate
        run: bash scripts/ci/check-helio-dry.sh

      - name: Tear down Bifrost + dump logs
        if: always()
        run: bash scripts/ci/stop-bifrost.sh
