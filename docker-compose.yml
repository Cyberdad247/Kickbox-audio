# Local PostgreSQL for development.
# Usage:
#   docker compose up -d
#   cp packages/db/.env.example packages/db/.env   # already points at this DB
#   npm run db:migrate:dev && npm run db:seed
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sovereign
    ports:
      - '5432:5432'
    volumes:
      - sovereign_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sovereign']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sovereign_pgdata:
